name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Docker Login
        id: login
        uses: docker/login-action@v3.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5.1.0
        with:
          file: PortfolioWeb/Dockerfile

      - name: Docker Logout
        if: always()
        run: docker logout ${{ steps.login.outputs.registry }}
  
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Copy docker-compose
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/website"

      - name: Docker Login
        id: login
        uses: docker/login-action@v3.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Put environment variables and run containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/website/
            touch .env
            echo PortfolioDbPassword=${{ secrets.DB_PASSWORD }} >> .env
            echo PortfolioDbConnectionString=${{ secrets.DB_CONNECTION_STRING }} >> .env
            docker-compose up -d
            rm .env

      - name: Docker Logout
        if: always()
        run: docker logout ${{ steps.login.outputs.registry }}
