services:
  database:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: 1
      MSSQL_SA_PASSWORD: ${PortfolioDbPassword:?error}
    ports:
      - "1500:1433"
  
  portfolioweb:
    depends_on: 
      - database
    image: portfolioweb
    environment:
      ASPNETCORE_ConnectionStrings__Portfolio: ${PortfolioDbConnectionString:?error}
    build:
      context: .
      dockerfile: PortfolioWeb/Dockerfile
    ports:
      - "80:8080"